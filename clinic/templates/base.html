<!DOCTYPE html>
<html>
<head>
<title>Clinic Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
overflow-x:hidden;
}

.sidebar{
height:100vh;
background:#343a40;
color:white;
padding:20px;
}

.sidebar a{
display:block;
color:white;
padding:12px;
text-decoration:none;
border-radius:5px;
}

.sidebar a:hover{
background:#495057;
}

.active-menu{
background:#0d6efd;
}

.content{
padding:20px;
}

footer{
background:#343a40;
color:white;
text-align:center;
padding:10px;
}

</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<div class="col-md-2 sidebar">

<h4>Clinic</h4>

<a href="/" class="active-menu">
<i class="fa fa-dashboard"></i> Dashboard
</a>

<a href="/doctors/">
<i class="fa fa-user-md"></i> Doctors
</a>

<a href="/patients/">
<i class="fa fa-users"></i> Patients
</a>

<a href="/appointments/">
<i class="fa fa-calendar"></i> Appointments
</a>

<a href="/logout/">
<i class="fa fa-sign-out"></i> Logout
</a>

</div>

<!-- Content -->
<div class="col-md-10 content">

<nav class="navbar navbar-light bg-light">
<span class="navbar-brand">
Clinic Management Dashboard
</span>
</nav>

<br>

{% block content %}
{% endblock %}

</div>

</div>
</div>

<footer>
© 2026 Clinic Management System | Django Project
</footer>

</body>
</html>
